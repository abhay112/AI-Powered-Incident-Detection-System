apiVersion: 1

contactPoints:
  - orgId: 1
    name: incident-service-webhook
    receivers:
      - uid: incident-webhook-receiver
        type: webhook
        settings:
          url: http://incident-service:4000/webhook/alert
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: incident-service-webhook
    group_by: ['alertname', 'route']
    group_wait: 10s
    group_interval: 30s
    repeat_interval: 5m
